[package]
name = "salon"
version = "0.1.0"
edition = "2021"

[dependencies]
crossterm = "0.29.0"
dotenvy = "0.15.7"
rand = "0.8"
rand_chacha = "0.3"
ratatui = "0.30.0"
reqwest = { version = "0.12", default-features = false, features = ["blocking", "json", "rustls-tls"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
rand = "0.8"
rand_chacha = "0.3"

[lib]
name = "salon"
path = "src/lib.rs"

[[bin]]
name = "salon"
path = "src/main.rs"
